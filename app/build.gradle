plugins {
    id 'com.android.application'
}

android {
    namespace 'net.pgaskin.cmus.android'
    compileSdk 36
    ndkVersion '28.2.13676358'

    defaultConfig {
        applicationId 'net.pgaskin.cmus.android'
        minSdk 34
        targetSdk 36
        versionCode 1
        versionName '1'

        externalNativeBuild {
            cmake {
                targets 'cmus_deps'
            }
        }
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    externalNativeBuild {
        cmake {
            path '../native/CMakeLists.txt'
            version '3.30.5'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
}

// fail early if third_party patches exist but haven't been applied
def patchCheck = tasks.register('patchCheck', Exec) {
    workingDir rootDir
    commandLine './patch.sh', 'check'
}
tasks.named('preBuild') {
    dependsOn patchCheck
}
