name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    environment:
      name: release
      deployment: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Check version
        id: version
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const gradle = fs.readFileSync('app/build.gradle', 'utf8')
            const versionName = gradle.match(/^\s*versionName\s+'([^']+)'/m)?.[1]
            const versionCode = gradle.match(/^\s*versionCode\s+([0-9]+)/m)?.[1]
            if (!versionName) throw new Error('missing versionName in app/build.gradle')
            if (!versionCode) throw new Error('missing versionCode in app/build.gradle')
            const tag = context.ref.replace(/^refs\/tags\//, '')
            if (versionName !== versionCode) throw new Error(`versionName (${versionName}) does not match versionCode (${versionCode})`)
            if (tag !== `v${versionName}`) throw new Error(`tag (${tag}) does not match versionName (${versionName})`)
            if (tag !== `v${versionCode}`) throw new Error(`tag (${tag}) does not match versionCode (${versionCode})`)
            if (!fs.existsSync(`metadata/en-US/changelogs/${versionCode}.txt`)) throw new Error(`missing changelog for versionCode ${versionCode}`)
            core.setOutput('name', versionName)
            core.setOutput('code', versionCode)
            core.setOutput('tag', tag)

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: gradle
      - run: yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses; ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager 'cmake;3.30.5' 'ndk;28.2.13676358' 'build-tools;36.0.0'
      - run: ./patch.sh
      - run: ./gradlew app:assembleRelease

      - name: Write keystore
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      - name: Sign APK
        # v1 (JAR) signing off: minSdk 34 never uses it, and it only adds dead
        # META-INF entries. The APK Signing Block (v2/v3) is the whole signature.
        run: $ANDROID_HOME/build-tools/36.0.0/apksigner sign --v1-signing-enabled false --ks "$KEYSTORE_PATH" --ks-pass env:KEYSTORE_PASSWORD --in app/build/outputs/apk/release/app-release-unsigned.apk --out app-release.apk
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      - name: Verify APK signature
        run: $ANDROID_HOME/build-tools/36.0.0/apksigner verify --print-certs app-release.apk

      - name: Verify reproducible build
        # Rebuild from a copy at a different absolute path (a reproducible build
        # must not depend on the checkout location), then confirm both the two
        # independent unsigned builds and the signed APK we're about to publish
        # reproduce. See notes/reproducible-builds.md.
        run: |
          set -euo pipefail
          rebuild=/tmp/cmus-rebuild-at-a-different-path
          rsync -a --delete \
            --exclude='/build/' --exclude='/app/build/' \
            --exclude='.gradle/' --exclude='.cxx/' \
            ./ "$rebuild/"
          ( cd "$rebuild" && ./gradlew --no-daemon app:assembleRelease )
          unsigned=app/build/outputs/apk/release/app-release-unsigned.apk
          rebuilt="$rebuild/app/build/outputs/apk/release/app-release-unsigned.apk"
          # the two independent builds must be bit-for-bit identical
          go run notes/check-reproducible.go "$unsigned" "$rebuilt"
          # the signed APK must reproduce from that build (differing only in the signature)
          go run notes/check-reproducible.go app-release.apk "$rebuilt"

      - name: Create release
        id: create-release
        uses: actions/github-script@v8
        with:
          retries: 3
          script: |
            const tag = ${{ toJSON(steps.version.outputs.tag) }}
            const versionCode = ${{ toJSON(steps.version.outputs.code) }}
            const {data: {id: id}} = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: tag,
              body: require('fs').readFileSync(`metadata/en-US/changelogs/${versionCode}.txt`, 'utf8'),
              draft: true,
            })
            core.setOutput('id', id)
      - name: Upload release asset
        uses: actions/github-script@v9
        with:
          retries: 3
          script: |
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ toJSON(steps.create-release.outputs.id) }},
              data: require('fs').readFileSync('app-release.apk'),
              name: 'cmus.apk',
            })
